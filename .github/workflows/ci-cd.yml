name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            Application-Code/backend/package-lock.json
            Application-Code/frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: Application-Code/backend
        run: npm ci

      - name: Run backend tests
        working-directory: Application-Code/backend
        run: npm test

      - name: Install frontend dependencies
        working-directory: Application-Code/frontend
        run: npm ci

      - name: Build frontend
        working-directory: Application-Code/frontend
        run: npm run build

      - name: Build backend Docker image
        run: docker build -t todo-backend:latest Application-Code/backend

      - name: Build frontend Docker image
        run: docker build -t todo-frontend:latest Application-Code/frontend
